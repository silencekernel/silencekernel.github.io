<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SilenceKernel Data</title>
  <meta name="description" content="SilenceKernel Data — clean, minimal viewer for texts and files." />

  <!-- Soft dark theme with subtle purple accent -->
  <style>
    :root{
      --bg:#0c0f12;
      --card:#0f1316;
      --muted:#9aa3ad;
      --accent:#7b4dff; /* soft purple accent */
      --accent-2:#8b2f45; /* optional maroon for small highlights */
      --glass: rgba(255,255,255,0.03);
      --radius:14px;
      --max-width:960px;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", monospace;
      color-scheme: dark;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: linear-gradient(180deg, rgba(12,15,18,1) 0%, rgba(8,10,12,1) 100%);
      color:#e6eef6;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:36px 20px;
    }

    .wrap{
      width:100%;
      max-width:var(--max-width);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:18px;
      padding:28px;
      box-shadow: 0 6px 30px rgba(2,6,23,0.7);
      border: 1px solid rgba(255,255,255,0.03);
    }

    header{
      display:flex;
      gap:16px;
      align-items:center;
      margin-bottom:20px;
    }
    .logo{
      width:56px;
      height:56px;
      border-radius:12px;
      display:grid;
      place-items:center;
      font-weight:700;
      background: linear-gradient(135deg, rgba(123,77,255,0.14), rgba(139,47,69,0.12));
      border:1px solid rgba(255,255,255,0.03);
      color:var(--accent);
      font-family: var(--mono);
      font-size:18px;
    }
    h1{
      margin:0;
      font-size:20px;
      letter-spacing: -0.02em;
    }
    p.lead{
      margin:4px 0 0 0;
      color:var(--muted);
      font-size:13px;
    }

    main{
      display:grid;
      gap:18px;
      grid-template-columns: 1fr;
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 380px;
      gap:18px;
    }

    @media (max-width:880px){ .grid{ grid-template-columns: 1fr } }

    section.card{
      background: linear-gradient(180deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));
      border-radius:var(--radius);
      padding:16px;
      border:1px solid rgba(255,255,255,0.02);
    }

    .section-title{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:12px;
    }
    .section-title h2{
      margin:0;
      font-size:14px;
      color:#eff7ff;
    }
    .section-title small{ color:var(--muted); font-size:12px }

    .list{ display:flex; flex-direction:column; gap:12px; max-height:56vh; overflow:auto; padding-right:6px; }
    .item{
      display:flex;
      gap:12px;
      align-items:flex-start;
      background:var(--glass);
      border-radius:12px;
      padding:12px;
      border:1px solid rgba(255,255,255,0.02);
    }
    .item .meta{ flex:1; min-width:0 }
    .item h3{ margin:0; font-size:13px; color:#ffffff }
    .item p{ margin:6px 0 0 0; color:var(--muted); font-size:13px; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; white-space:normal }
    .item .actions{ display:flex; gap:8px; align-items:center; margin-left:auto }

    button.btn{
      border:0;
      background:transparent;
      color:var(--accent);
      padding:8px 10px;
      border-radius:10px;
      font-weight:600;
      font-size:13px;
      cursor:pointer;
      transition: all .12s ease;
      backdrop-filter: blur(6px);
    }
    button.btn.secondary{ color:var(--muted); border:1px solid rgba(255,255,255,0.03); padding:7px 10px; background:transparent }
    button.btn:hover{ transform:translateY(-2px); filter:brightness(1.05) }

    .file-meta{ font-size:12px; color:var(--muted); margin-top:6px; display:flex; gap:10px; align-items:center; flex-wrap:wrap }
    .badge{ font-family:var(--mono); font-size:11px; background:rgba(255,255,255,0.02); padding:6px 8px; border-radius:8px; color:var(--muted); border:1px solid rgba(255,255,255,0.02) }

    /* modal */
    .modal-backdrop{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:linear-gradient(0deg, rgba(2,6,23,0.6), rgba(2,6,23,0.6));
      z-index:80;
      padding:28px;
    }
    .modal{
      width:100%;
      max-width:900px;
      max-height:86vh;
      overflow:auto;
      border-radius:14px;
      padding:16px;
      background:linear-gradient(180deg, #071018, #0a0e12);
      border:1px solid rgba(255,255,255,0.03);
      box-shadow:0 10px 40px rgba(2,6,23,0.8);
    }
    .modal header{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px }
    .modal h3{ margin:0; font-size:15px }
    .modal pre{
      white-space:pre-wrap;
      word-wrap:break-word;
      font-family: var(--mono);
      font-size:13px;
      color:#dbe9ff;
      background: transparent;
      margin:0;
    }
    .muted-small{ color:var(--muted); font-size:12px }

    footer{ margin-top:14px; color:var(--muted); font-size:12px; display:flex; justify-content:space-between; align-items:center; gap:12px }
    a.link{ color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,0.02); padding-bottom:2px }
    /* tiny loader */
    .loader{ height:6px; background:linear-gradient(90deg, rgba(123,77,255,0.18), rgba(139,47,69,0.14)); border-radius:6px; overflow:hidden }
    .loader > i{ display:block; width:30%; height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2)); animation: slide 1.3s infinite }
    @keyframes slide { 0%{transform:translateX(-120%)}100%{transform:translateX(220%)} }
    /* scrollbar */
    .list::-webkit-scrollbar{ width:8px } .list::-webkit-scrollbar-thumb{ background:rgba(255,255,255,0.03); border-radius:8px }
  </style>
</head>
<body>
  <div class="wrap" role="main">
    <header>
      <div class="logo" aria-hidden="true">SK</div>
      <div>
        <h1>SilenceKernel Data</h1>
        <p class="lead">Clean viewer for texts and files — minimal, fast, and download-ready.</p>
      </div>
    </header>

    <main>
      <div class="grid" aria-live="polite">
        <section class="card" id="texts-section" aria-labelledby="texts-title">
          <div class="section-title">
            <h2 id="texts-title">Texts</h2>
            <small id="texts-count" class="muted-small">Loading…</small>
          </div>

          <div id="texts-list" class="list" aria-label="List of texts">
            <!-- JS fills this -->
            <div class="loader" id="texts-loader"><i></i></div>
          </div>
        </section>

        <aside class="card" id="files-section" aria-labelledby="files-title">
          <div class="section-title">
            <h2 id="files-title">Files</h2>
            <small id="files-count" class="muted-small">Loading…</small>
          </div>

          <div id="files-list" class="list" aria-label="List of files">
            <div class="loader" id="files-loader"><i></i></div>
          </div>

          <footer>
            <span class="muted-small">Source: <a class="link" href="data.json">data.json</a></span>
            <span class="muted-small">Theme: soft dark</span>
          </footer>
        </aside>
      </div>
    </main>

    <!-- Modal for preview -->
    <div id="modal-backdrop" class="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
      <div class="modal" role="document">
        <header>
          <div>
            <h3 id="modal-title">Preview</h3>
            <div id="modal-sub" class="muted-small" aria-hidden="true"></div>
          </div>
          <div>
            <button id="modal-download" class="btn" title="Download file" style="display:none">Download</button>
            <button id="modal-close" class="btn secondary" title="Close preview">Close</button>
          </div>
        </header>
        <pre id="modal-content">Loading…</pre>
      </div>
    </div>

    <noscript style="display:block; margin-top:14px; color:var(--muted)">
      JavaScript is required for the interactive preview. You can still open <a class="link" href="data.json">data.json</a>.
    </noscript>
  </div>

  <script>
    // Minimal, robust fetch + UI logic
    (function(){
      const base = location.origin + location.pathname.replace(/\/[^/]*$/, '/'); // base for relative file URLs
      const modalBackdrop = document.getElementById('modal-backdrop');
      const modalContent = document.getElementById('modal-content');
      const modalTitle = document.getElementById('modal-title');
      const modalSub = document.getElementById('modal-sub');
      const modalClose = document.getElementById('modal-close');
      const modalDownload = document.getElementById('modal-download');

      function showModal(title, sub, content, downloadHref){
        modalTitle.textContent = title || 'Preview';
        modalSub.textContent = sub || '';
        modalContent.textContent = content || '';
        if(downloadHref){
          modalDownload.style.display = 'inline-block';
          modalDownload.onclick = () => { window.open(downloadHref, '_blank') };
        } else {
          modalDownload.style.display = 'none';
          modalDownload.onclick = null;
        }
        modalBackdrop.style.display = 'flex';
        modalBackdrop.setAttribute('aria-hidden','false');
        setTimeout(()=> modalClose.focus(), 120);
      }
      function hideModal(){
        modalBackdrop.style.display = 'none';
        modalBackdrop.setAttribute('aria-hidden','true');
      }
      modalClose.addEventListener('click', hideModal);
      modalBackdrop.addEventListener('click', (e) => { if(e.target === modalBackdrop) hideModal(); });
      window.addEventListener('keydown', (e) => { if(e.key === 'Escape') hideModal(); });

      // Helpers
      function el(tag, props, children){
        const n = document.createElement(tag);
        if(props) Object.entries(props).forEach(([k,v]) => {
          if(k === 'class') n.className = v;
          else if(k === 'html') n.innerHTML = v;
          else n.setAttribute(k, v);
        });
        if(children) children.forEach(ch => n.appendChild(ch));
        return n;
      }

      function safeTextPreview(text, length=200){
        if(!text) return '';
        return text.length > length ? text.slice(0, length).trim() + '…' : text;
      }

      function buildFileItem(file){
        const name = file.name || file.path || 'untitled';
        const desc = file.description || '';
        const path = file.path || file.url || name;
        const href = new URL(path, base).href.replace(/\/+$/, '');

        const meta = el('div', { class: 'file-meta' }, []);
        meta.appendChild(el('span',{class:'badge'}, [document.createTextNode(path.split('/').pop())]));
        if(desc) meta.appendChild(el('span',{class:''}, [document.createTextNode(desc)] ));

        const item = el('div',{class:'item'});
        const metaWrap = el('div',{class:'meta'});
        metaWrap.appendChild(el('h3',{}, [document.createTextNode(name)]));
        metaWrap.appendChild(meta);

        const actions = el('div',{class:'actions'});
        const btnView = el('button',{class:'btn', title:'View file (text)'} , [document.createTextNode('View')]);
        const aDownload = el('a',{class:'btn', title:'Download file', href:href, download:''}, [document.createTextNode('Download')]);

        btnView.addEventListener('click', () => {
          fetch(href).then(r => {
            if(!r.ok) throw new Error('Failed to fetch file');
            return r.text();
          }).then(txt => showModal(name, path, txt, href))
            .catch(err => showModal('Error', path, 'Unable to load file preview.'));
        });

        actions.appendChild(btnView);
        actions.appendChild(aDownload);

        item.appendChild(metaWrap);
        item.appendChild(actions);
        return item;
      }

      function buildTextItem(obj, idx){
        const name = obj.name || obj.title || `Text ${idx+1}`;
        const text = obj.text || obj.body || '';
        const files = Array.isArray(obj.files) ? obj.files : [];

        const item = el('div',{class:'item'});
        const metaWrap = el('div',{class:'meta'});
        metaWrap.appendChild(el('h3',{}, [document.createTextNode(name)]));
        metaWrap.appendChild(el('p',{}, [document.createTextNode(safeTextPreview(text, 260))]));

        const fm = el('div',{class:'file-meta'});
        if(files.length) fm.appendChild(el('span',{class:'badge'}, [document.createTextNode(files.length + ' file' + (files.length>1 ? 's' : ''))]));
        else fm.appendChild(el('span',{class:'muted-small'}, [document.createTextNode('No files')]));
        metaWrap.appendChild(fm);

        const actions = el('div',{class:'actions'});
        const btnRead = el('button',{class:'btn'}, [document.createTextNode('Read')]);
        btnRead.addEventListener('click', () => showModal(name, files.length ? `${files.length} attached file(s)` : '', text, null));
        actions.appendChild(btnRead);

        // If files are embedded with the text, add quick download links inside the item
        if(files.length){
          const dropdown = el('div', {class:''}, []);
          files.slice(0,3).forEach(f => {
            const link = new URL(f.path || f.url || f.name, base).href;
            const a = el('a', { href: link, class: 'btn secondary', title: (f.description || 'Download file') }, [document.createTextNode('DL: ' + (f.name || link.split('/').pop()))]);
            a.style.fontSize='12px';
            a.style.padding='6px 8px';
            a.style.marginLeft='6px';
            dropdown.appendChild(a);
          });
          if(files.length > 3){
            const more = el('span', {class:'muted-small'}, [document.createTextNode(` +${files.length-3} more`)]);
            dropdown.appendChild(more);
          }
          actions.appendChild(dropdown);
        }

        item.appendChild(metaWrap);
        item.appendChild(actions);
        return item;
      }

      // Try flexible parsing for many possible data.json shapes
      function parseAndRender(data){
        const textsList = document.getElementById('texts-list');
        const filesList = document.getElementById('files-list');
        const textsCount = document.getElementById('texts-count');
        const filesCount = document.getElementById('files-count');

        // Clear loaders
        textsList.innerHTML = '';
        filesList.innerHTML = '';

        // Normalize items
        let items = [];
        if(Array.isArray(data)){
          // could be array of items where each has name,text,files OR array of files OR array of texts
          const looksLikeFiles = data.every(d => d.path || d.url || d.name && (d.path || d.url));
          const looksLikeTexts = data.every(d => typeof d.text === 'string' || typeof d.body === 'string' || d.name);
          if(looksLikeFiles){
            // treat all as files
            data.forEach(f => {
              filesList.appendChild(buildFileItem(f));
            });
            filesCount.textContent = data.length + ' file' + (data.length>1?'s':'');
            textsCount.textContent = '—';
            return;
          } else {
            items = data;
          }
        } else if(typeof data === 'object' && data !== null){
          // possible shapes:
          // { items: [...] } or { texts: [...], files: [...] } or { entries: [...] }
          if(Array.isArray(data.items)) items = data.items;
          else if(Array.isArray(data.entries)) items = data.entries;
          else if(Array.isArray(data.texts)) {
            data.texts.forEach((t,i) => textsList.appendChild(buildTextItem(t,i)));
            textsCount.textContent = (data.texts.length || 0) + ' text' + ((data.texts.length||0)>1?'s':'');
          }
          if(Array.isArray(data.files)){
            data.files.forEach(f => filesList.appendChild(buildFileItem(f)));
            filesCount.textContent = (data.files.length || 0) + ' file' + ((data.files.length||0)>1?'s':'');
          }
          // if object itself contains name/text/files -> single item
          if(data.name && (data.text || data.body)){
            items = [data];
          }
        }

        // If we normalized to items (each with name,text,files)
        if(items && items.length){
          items.forEach((it,idx) => {
            // if the item looks like a file, also append to files
            if(it.path || it.url){
              filesList.appendChild(buildFileItem(it));
            } else {
              textsList.appendChild(buildTextItem(it, idx));
              // if this item has files, also add those to the files list
              if(Array.isArray(it.files)){
                it.files.forEach(f => filesList.appendChild(buildFileItem(f)));
              }
            }
          });
          textsCount.textContent = textsList.children.length + ' text' + (textsList.children.length>1?'s':'');
          filesCount.textContent = filesList.children.length + ' file' + (filesList.children.length>1?'s':'');
        }

        // If still empty show friendly message
        if(!textsList.children.length) textsList.appendChild(el('div',{class:''}, [document.createTextNode('No texts found in data.json')]));
        if(!filesList.children.length) filesList.appendChild(el('div',{class:''}, [document.createTextNode('No files found in data.json')]));
      }

      // Fetch data.json
      fetch('data.json', {cache:'no-store'}).then(r => {
        if(!r.ok) throw new Error('Failed to load data.json');
        return r.json();
      }).then(parseAndRender)
      .catch(err => {
        // show error
        document.getElementById('texts-list').innerHTML = '';
        document.getElementById('files-list').innerHTML = '';
        document.getElementById('texts-list').appendChild(el('div',{}, [document.createTextNode('Unable to load data.json — check the file at /data.json')]));
        document.getElementById('files-list').appendChild(el('div',{}, [document.createTextNode('Unable to load data.json — check the file at /data.json')]));
        document.getElementById('texts-count').textContent = 'Error';
        document.getElementById('files-count').textContent = 'Error';
        console.error(err);
      });
    })();
  </script>
</body>
</html>
